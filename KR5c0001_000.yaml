body:
  text: 太上老君説常清靜妙經太上玄靈斗姆大聖元君本命延生心經太上玄靈北斗本命延生眞經太上玄靈北斗本命長生妙經太上老君説常清靜妙經老君曰大道無形生育天地大道無情運行日月大道無名長養萬物吾不知其名强名曰道夫道者有清有濁有動有靜天清地濁天動地靜男清女濁男動女靜降本流末而生萬物清者濁之源動者靜之基人能常清靜天地悉皆歸夫人神好清而心擾之人心好靜而慾牽之常能遣其欲而心自靜澄其心而神自清自然六欲不生三毒消滅所以不能者爲心未澄慾未遣也能遣之者内觀於心心無其心外觀於形形無其形逺觀於物物無其物三者旣悟唯見於空觀空以空空無所空所空旣無無無亦無無無旣無湛然常寂寂無所寂慾豈能生慾旣不生即是眞靜眞靜應物眞常得性常應常靜常清靜矣如此清靜漸入眞道旣入眞道名爲得道雖名得道實無所得爲化衆生名爲得道能悟之者可傳聖道老君曰上士無爭下士好爭上徳不徳下徳執徳執著之者不名道徳衆生所以不得眞道者爲有妄心旣有妄心即驚其神旣驚其神即著萬物旣著萬物即生貪求旣生貪求即是煩惱煩惱妄想憂苦身心便遭濁辱流浪生死常沉苦海永失眞道眞常之道悟者自得得悟道者常清靜矣太上老君説常清靜妙經仙人葛仙翁曰吾得眞道曾誦此經萬徧此經是天人所習不傳下士吾昔受之於東華帝君東華帝君受之於金闕帝君金闕帝君受之於西王母西王母皆口口相傳不記文字吾今於世書而録之上士悟之升爲天官中士得之南宫列仙下士修之在世長年遊行三界昇入金門左玄眞人曰學道之士持誦此經者即得十天善神擁護其人然後玉符保神金液錬形形神俱妙與道合眞正一眞人曰人家有此經悟解之者災障不干衆聖護門神升上界朝拜髙尊功满徳就相感帝君誦持不退身騰紫雲
